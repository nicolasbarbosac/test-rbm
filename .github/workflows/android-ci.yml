name: Android Payment App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout de código
        uses: actions/checkout@v4

      # Configuración de JDK 11 (según tus requisitos)
      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Zulu es excelente para compatibilidad con Android
          java-version: '17'
          cache: 'gradle'

      - name: Dar permisos a Gradlew
        run: chmod +x gradlew

      # 1. Ejecutar Unit Tests (Los 14 casos que mencionaste)
      # Esto incluye AmountFilter, AuthorizePayment, GetTransactions y MaskFrame
      - name: Ejecutar Unit Tests
        run: ./gradlew test

      # 2. Build del proyecto
      # Verifica que Hilt, Room y Retrofit compilen correctamente
      - name: Compilar Proyecto (Debug)
        run: ./gradlew assembleDebug

      # 3. (Opcional) Subir reporte de tests en caso de fallo
      - name: Subir Reporte de Errores
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-unit-tests
          path: app/build/reports/tests/testDebugUnitTest/